// Version de la app. Cambia este valor en cada deploy importante.
const APP_VERSION = '2026.05.05.6';
const APP_BUILD = 'optimized';

// Verificador anti-cache para iPhone/Safari.
// Si VERSION.txt cambia, la app fuerza una recarga limpia una sola vez.
(function(){
  try{
    var current = localStorage.getItem('eldragon_app_version');
    if(current !== APP_VERSION){
      localStorage.setItem('eldragon_app_version', APP_VERSION);
    }
    fetch('/VERSION.txt?ts=' + Date.now(), {cache:'no-store'})
      .then(function(r){return r.ok ? r.text() : '';})
      .then(function(remote){
        remote = (remote || '').trim();
        if(remote && remote !== APP_VERSION){
          var lastReload = localStorage.getItem('eldragon_last_reload_for_version');
          if(lastReload !== remote){
            localStorage.setItem('eldragon_last_reload_for_version', remote);
            window.location.replace(window.location.pathname + '?v=' + encodeURIComponent(remote));
          }
        }
      })
      .catch(function(){});
  }catch(err){}
})();

    var s=document.createElement('script');

    var timeout=setTimeout(function(){reject(new Error('SDK timeout'))},8000);

    s.onerror=function(){clearTimeout(timeout);reject(new Error('SDK load failed'))};
    document.head.appendChild(s);
  }).catch(function(){
    // Fallback CDN
    _sbLoading=null;
    return new Promise(function(resolve,reject){
      var s2=document.createElement('script');

}

async function hashPin(pin){
  var enc=new TextEncoder().encode('eldragon-'+pin);
  var buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

var Api={
  mode:function(){return getStoredCreds()?'live':'demo'},
  _client:null,
  client:async function(){
    var creds=getStoredCreds();if(!creds)return null;
    try{
      var sb=await loadSupabaseSDK();
      if(!Api._client)Api._client=sb.createClient(creds.url,creds.key);
      return Api._client;
    }catch(err){console.warn('[El Dragon] No se pudo cargar Supabase SDK, usando modo demo:',err.message);return null}
  },
  listGames:async function(){
    var c=await Api.client();if(!c)return DEMO_GAMES;
    var r=await c.from('games').select('*').order('name');
    return r.error?DEMO_GAMES:r.data;
  },
  listPlayers:async function(){
    var c=await Api.client();if(!c)return DEMO_PLAYERS;
    var r=await c.from('player_stats').select('*').order('wins',{ascending:false});
    return r.error?DEMO_PLAYERS:r.data;
  },
  listMatches:async function(limit){
    limit=limit||30;var c=await Api.client();if(!c)return DEMO_MATCHES.map(function(m){
      var g=DEMO_GAMES.find(function(x){return x.id===m.game_id});
      return Object.assign({},m,{game_approved:g?g.approved!==false:true,match_approved:m.approved!==false});
    });
    var r=await c.from('matches')
      .select('id,game_id,played_at,duration_min,difficulty,notes,approved, games(name,approved), winner:players!matches_winner_id_fkey(username), match_players(player_id, score, players(username))')
      .order('played_at',{ascending:false}).limit(limit);
    if(r.error)return DEMO_MATCHES;
    return(r.data||[]).map(function(m){return{
      id:m.id,game_id:m.game_id,game_name:m.games?m.games.name:'\u2014',
      game_approved:m.games?m.games.approved!==false:true,
      match_approved:m.approved!==false,
      played_at:m.played_at,duration_min:m.duration_min,difficulty:m.difficulty,notes:m.notes,
      winner:m.winner?m.winner.username:null,
      players:(m.match_players||[]).map(function(mp){return mp.players?mp.players.username:null}).filter(Boolean),
    }});
  },
  listBadges:async function(){return DEMO_BADGES},
  findPlayer:async function(username){
    username=username.trim().toLowerCase();if(!username)throw new Error('Falta nombre');
    var c=await Api.client();
    if(!c)return DEMO_PLAYERS.find(function(p){return p.username===username})||null;
    var r=await c.from('players').select('*').eq('username',username).maybeSingle();
    return r.data;
  },
  createPlayer:async function(username,pin,emoji){
    username=username.trim().toLowerCase();var c=await Api.client();
    if(!c)return{id:'demo-'+username,username:username,display_name:username,avatar_emoji:emoji};
    var ph=await hashPin(pin);
    var r=await c.from('players').insert({username:username,display_name:username,avatar_emoji:emoji,pin_hash:ph}).select().single();
    if(r.error)throw r.error;return r.data;
  },
  loginPlayer:async function(username,pin){
    username=username.trim().toLowerCase();var c=await Api.client();
    if(!c)return DEMO_PLAYERS.find(function(p){return p.username===username})||{id:'demo-'+username,username:username,display_name:username,avatar_emoji:'\u{1F3B2}'};
    var ph=await hashPin(pin);
    var r=await c.from('players').select('*').eq('username',username).eq('pin_hash',ph).maybeSingle();
    if(r.error||!r.data)throw new Error('PIN incorrecto');return r.data;
  },
  createMatch:async function(payload){
    var c=await Api.client();
    if(!c){console.log('[demo] partida:',payload);return{ok:true,demo:true}}
    var r=await c.from('matches').insert({
      game_id:payload.game_id,played_at:payload.played_at,duration_min:payload.duration_min,
      difficulty:payload.difficulty,winner_id:payload.winner_id,notes:payload.notes,created_by:payload.created_by,
    }).select().single();
    if(r.error)throw r.error;
    if(payload.players&&payload.players.length){
      var rows=payload.players.map(function(pid){return{match_id:r.data.id,player_id:pid}});
      await c.from('match_players').insert(rows);
    }
    return{ok:true,match:r.data};
  },
  addGame:async function(name,category){
    var c=await Api.client();
    if(!c)return{id:'g-'+Date.now(),name:name,category:category,min_players:2,max_players:4,avg_duration:30,approved:false};
    var r=await c.from('games').insert({name:name,category:category,approved:false}).select().single();
    if(r.error)throw r.error;return r.data;
  },
  approveMatch:async function(matchId,approve){
    var val=approve!==false;
    var c=await Api.client();
    if(!c){var m=DEMO_MATCHES.find(function(x){return x.id===matchId});if(m)m.approved=val;return{ok:true}}
    var r=await c.from('matches').update({approved:val}).eq('id',matchId);
    if(r.error)throw r.error;return{ok:true};
  },

  approveGame:async function(gameId,approve){
    var val=approve!==false;
    var c=await Api.client();
    if(!c){var g=DEMO_GAMES.find(function(x){return x.id===gameId});if(g)g.approved=val;return{ok:true}}
    var r=await c.from('games').update({approved:val}).eq('id',gameId);
    if(r.error)throw r.error;return{ok:true};
  },
  deleteMatch:async function(matchId){
    var c=await Api.client();
    if(!c){var idx=DEMO_MATCHES.findIndex(function(x){return x.id===matchId});if(idx>=0)DEMO_MATCHES.splice(idx,1);return{ok:true}}
    await c.from('match_players').delete().eq('match_id',matchId);
    var r=await c.from('matches').delete().eq('id',matchId);
    if(r.error)throw r.error;return{ok:true};
  },
};

// ─── Supabase Config ────────────────────────────────────────
var SCHEMA_SQL='-- ════════════════════════════════════════════════════════════════\n--  EL DRAGON BG&G — Esquema Supabase\n--  Cafeteria de juegos de mesa - Registro de partidas\n-- ════════════════════════════════════════════════════════════════\n--  Ejecuta en: Supabase → SQL Editor → New query\n-- ════════════════════════════════════════════════════════════════\n\n-- 1. Jugadores\ncreate table if not exists players (\n  id           uuid primary key default gen_random_uuid(),\n  username     text unique not null,\n  display_name text,\n  avatar_emoji text default \'🐉\',\n  pin_hash     text,\n  created_at   timestamptz default now()\n);\n\n-- 2. Catalogo de juegos\ncreate table if not exists games (\n  id            uuid primary key default gen_random_uuid(),\n  name          text unique not null,\n  min_players   int default 2,\n  max_players   int default 4,\n  avg_duration  int,\n  category      text,\n  available     boolean default true,\n  approved      boolean default true,\n  added_by      uuid references players(id),\n  created_at    timestamptz default now()\n);\n\n-- 3. Partidas\ncreate table if not exists matches (\n  id           uuid primary key default gen_random_uuid(),\n  game_id      uuid not null references games(id),\n  played_at    timestamptz not null default now(),\n  duration_min int,\n  difficulty   int check (difficulty between 1 and 5),\n  winner_id    uuid references players(id),\n  notes        text,\n  created_by   uuid references players(id),\n  approved     boolean default false,\n  created_at   timestamptz default now()\n);\n\n-- 4. Participantes\ncreate table if not exists match_players (\n  match_id  uuid references matches(id) on delete cascade,\n  player_id uuid references players(id),\n  score     int,\n  primary key (match_id, player_id)\n);\n\n-- 5. Logros\ncreate table if not exists badges (\n  id text primary key, name text not null, description text, emoji text default \'🏅\'\n);\ncreate table if not exists player_badges (\n  player_id uuid references players(id) on delete cascade,\n  badge_id  text references badges(id),\n  earned_at timestamptz default now(),\n  primary key (player_id, badge_id)\n);\n\ninsert into badges (id, name, description, emoji) values\n  (\'first_match\', \'Primera partida\',  \'Tu primera cronica\',                      \'🎲\'),\n  (\'first_win\',   \'Primera victoria\', \'Tu primer triunfo en la liga\',            \'🏆\'),\n  (\'marathon\',    \'Maratonista\',      \'Una partida de mas de 3 horas\',           \'⏰\'),\n  (\'explorer\',    \'Explorador\',       \'Probaste 10 juegos diferentes\',           \'🧭\'),\n  (\'regular\',     \'Habitual\',         \'25 partidas registradas\',                 \'☕\'),\n  (\'strategist\',  \'Estratega\',        \'5 victorias en juegos de estrategia\',     \'♟️\')\non conflict (id) do nothing;\n\n-- 6. Vista de stats (solo juegos aprobados cuentan para ranking)\ncreate or replace view player_stats as\n  select\n    p.id, p.username, p.display_name, p.avatar_emoji,\n    count(distinct mp.match_id) as matches_played,\n    count(distinct case when m.winner_id = p.id and g.approved = true and m.approved = true then m.id end) as wins,\n    coalesce(sum(m.duration_min) filter (where mp.player_id = p.id), 0) as total_minutes\n  from players p\n  left join match_players mp on mp.player_id = p.id\n  left join matches m on m.id = mp.match_id\n  left join games g on g.id = m.game_id\n  group by p.id;\n\n-- 7. RLS\nalter table players       enable row level security;\nalter table games         enable row level security;\nalter table matches       enable row level security;\nalter table match_players enable row level security;\nalter table badges        enable row level security;\nalter table player_badges enable row level security;\n\ncreate policy "read"   on players       for select using (true);\ncreate policy "insert" on players       for insert with check (true);\ncreate policy "update" on players       for update using (true);\ncreate policy "read"   on games         for select using (true);\ncreate policy "insert" on games         for insert with check (true);\ncreate policy "update" on games         for update using (true);\ncreate policy "read"   on matches       for select using (true);\ncreate policy "insert" on matches       for insert with check (true);\ncreate policy "update" on matches       for update using (true);\ncreate policy "delete" on matches       for delete using (true);\ncreate policy "read"   on match_players for select using (true);\ncreate policy "insert" on match_players for insert with check (true);\ncreate policy "read"   on badges        for select using (true);\ncreate policy "read"   on player_badges for select using (true);\ncreate policy "insert" on player_badges for insert with check (true);\n\n-- 8. Seed: catalogo inicial de El Dragon\ninsert into games (name, min_players, max_players, avg_duration, category) values\n  (\'Catan\',          3, 4, 90, \'estrategia\'),\n  (\'Carcassonne\',    2, 5, 45, \'familiar\'),\n  (\'Wingspan\',       1, 5, 70, \'estrategia\'),\n  (\'Codenames\',      4, 8, 20, \'party\'),\n  (\'Azul\',           2, 4, 35, \'familiar\'),\n  (\'7 Wonders Duel\', 2, 2, 30, \'estrategia\'),\n  (\'Dixit\',          3, 6, 30, \'party\'),\n  (\'Splendor\',       2, 4, 30, \'estrategia\'),\n  (\'Harmonies\',      2, 4, 35, \'familiar\'),\n  (\'Orleans\',        2, 4, 90, \'estrategia\'),\n  (\'Spy Connection\', 2, 4, 45, \'familiar\'),\n  (\'Feed the Kraken\',5, 11, 60, \'party\')\non conflict (name) do nothing;\n';

// ─── Routing ────────────────────────────────────────────────
function getRoute(){
  var clean=function(v){return(v||'').toLowerCase().replace(/^#\/?/,'').replace(/^\/+|\/+$/g,'')};
  var pathParts=clean(window.location.pathname).split('/').filter(Boolean);
  var path=pathParts[pathParts.length-1]||'';
  var h=clean(window.location.hash);
  var q=new URLSearchParams(window.location.search);
  if(path==='admin'||h==='admin'||q.has('admin'))return'admin';
  if(path==='ranking'||h==='ranking'||q.has('ranking'))return'ranking';
  if(path==='config'||h==='config'||q.has('config'))return'config';
  return'app';
}
function goTo(route){
  var target=route==='app'?'/':'/'+route;
  window.history.pushState(null,'',target);
  window.dispatchEvent(new PopStateEvent('popstate'));
}

    style:{position:'fixed',bottom:16,right:16,zIndex:1000,width:40,height:40,borderRadius:'50%',
      background:theme.deep,color:theme.gold,border:'1px solid '+theme.gold,cursor:'pointer',fontSize:16,
      display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}},
    mode==='light'?'\u{1F319}':'\u2600\uFE0F');

  if(loading)return e('div',{style:{background:theme.bg,minHeight:'100vh'}},e(Loading,{theme:theme,text:'Cargando El Dragon\u2026'}),themeToggle);

  if(route==='admin'){
    if(!adminOk)return e('div',null,e(AdminGate,{theme:theme,onUnlock:function(){setAdminOk(true)}}),themeToggle);
    return e('div',null,e(Dashboard,{theme:theme,players:players,matches:matches,games:games,
      onLogout:function(){setAdminOk(false);goTo('app')},onRefresh:refresh}),themeToggle);
  }
  if(route==='config')return e('div',null,e(SupabaseConfig,{theme:theme,onChanged:refresh,onClose:function(){goTo('app')}}),themeToggle);
  if(route==='ranking')return e('div',null,
    e('div',{style:{maxWidth:480,margin:'0 auto',minHeight:'100vh',display:'flex',flexDirection:'column',background:theme.bg}},
      e(MobileRanking,{theme:theme,players:players,matches:matches,onBack:function(){goTo('app')}})),themeToggle);
  return e('div',null,e(MobileApp,{theme:theme,games:games,players:players,matches:matches,badges:badges,refresh:refresh}),themeToggle);
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
